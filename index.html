<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Math Tutor Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero">
        <div class="hero-badge">🧮✨</div>
        <h1>Algebra Ace</h1>
        <p>Your playful math tutor for equations, graphs, and all things algebra.</p>
      </header>

      <main class="chat-card">
        <div id="chatMessages" class="messages" aria-live="polite"></div>

        <div class="suggestions" aria-label="Quick prompts">
          <button class="pill" type="button">Solve 2x + 5 = 13</button>
          <button class="pill" type="button">Explain factoring</button>
          <button class="pill" type="button">Teach quadratic roots</button>
        </div>

        <form id="chatForm" class="composer">
          <input
            id="userInput"
            type="text"
            placeholder="Ask me about algebra..."
            autocomplete="off"
            required
          />
          <button type="submit">Send</button>
        </form>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
